<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="kiwi_skin_grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#a67c52"/>
      <stop offset="100%" style="stop-color:#5d4037"/>
    </radialGradient>
    <radialGradient id="kiwi_flesh_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0f4c3"/>
      <stop offset="30%" style="stop-color:#dce775"/>
      <stop offset="60%" style="stop-color:#8bc34a"/>
      <stop offset="100%" style="stop-color:#558b2f"/>
    </radialGradient>
    <radialGradient id="kiwi_core_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4c3"/>
    </radialGradient>
    <filter id="kiwi_fuzz_filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#d7ccc8" surfaceScale="1">
        <feDistantLight azimuth="45" elevation="45"/>
      </feDiffuseLighting>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <filter id="kiwi_shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <g filter="url(#kiwi_shadow)">
