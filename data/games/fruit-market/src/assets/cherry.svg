<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="cherry_body_grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ff4d4d" />
      <stop offset="70%" style="stop-color:#b30000" />
      <stop offset="100%" style="stop-color:#660000" />
    </radialGradient>
    <radialGradient id="cherry_flesh_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffcccc" />
      <stop offset="60%" style="stop-color:#ff6666" />
      <stop offset="100%" style="stop-color:#e62e2e" />
    </radialGradient>
    <linearGradient id="cherry_stem_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4d6600" />
      <stop offset="50%" style="stop-color:#809900" />
      <stop offset="100%" style="stop-color:#334400" />
    </linearGradient>
    <filter id="cherry_shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="cherry_highlight_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff; stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff; stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Ground Shadow -->
  <ellipse cx="64" cy="112" rx="45" ry="8" style="fill:#000000; fill-opacity:0.15; filter:url(#cherry_shadow)" />

  <!-- Whole Cherry -->
  <g style="filter:url(#cherry_shadow)">
    <!-- Stem -->
    <path d="M 82,48 C 80,30 70,15 50,12 C 48,11 48,15 50,16 C 65,18 73,30 75,48" style="fill:none; stroke:url(#cherry_stem_grad); stroke-width:2.5; stroke-linecap:round;" />
    
    <!-- Cherry Body -->
    <path d="M 112,78 C 112,100 95,112 78,112 C 61,112 44,100 44,78 C 44,56 61,44 78,44 C 95,44 112,56 112,78 Z" style="fill:url(#cherry_body_grad)" />
    
    <!-- Stem Dimple -->
    <ellipse cx="78" cy="48" rx="10" ry="4" style="fill:#4d0000; fill-opacity:0.6" />
    
    <!-- Glossy Highlight -->
    <ellipse cx="68" cy="62" rx="8" ry="12" transform="rotate(-30, 68, 62)" style="fill:url(#cherry_highlight_grad)" />
  </g>

  <!-- Cut Slice -->
  <g style="filter:url(#cherry_shadow)">
    <!-- Slice Skin Outer -->
    <path d="M 45,108 C 25,108 12,95 12,75 C 12,65 18,55 25,50 L 45,80 Z" style="fill:#660000" />
    
    <!-- Slice Flesh -->
    <path d="M 42,104 C 28,104 16,92 16,75 C 16,68 20,60 25,56 L 42,80 Z" style="fill:url(#cherry_flesh_grad)" />
    
    <!-- Flesh Texture/Veins -->
    <path d="M 25,65 Q 30,75 42,80 M 20,80 Q 30,82 42,80 M 28,95 Q 35,90 42,80" style="fill:none; stroke:#ff9999; stroke-width:0.5; stroke-opacity:0.6" />
    
    <!-- Pit Cavity -->
    <ellipse cx="38" cy="78" rx="5" ry="7" transform="rotate(-15, 38, 78)" style="fill:#4d0000; fill-opacity:0.4" />
    
    <!-- Slice Highlight -->
    <path d="M 22,60 C 20,65 18,72 18,75" style="fill:none; stroke:#ffffff; stroke-width:1; stroke-linecap:round; stroke-opacity:0.4" />
  </g>
</svg>