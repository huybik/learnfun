<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="basketWeave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A056" />
      <stop offset="100%" style="stop-color:#A0754A" />
    </linearGradient>
    <linearGradient id="basketRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C49A4A" />
      <stop offset="100%" style="stop-color:#8B6914" />
    </linearGradient>
    <linearGradient id="basketHandle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8863C" />
      <stop offset="100%" style="stop-color:#8B5E3C" />
    </linearGradient>
  </defs>
  <!-- Handle -->
  <path d="M34,52 C34,20 94,20 94,52" fill="none" stroke="url(#basketHandle)" stroke-width="7" stroke-linecap="round" />
  <path d="M34,52 C34,24 94,24 94,52" fill="none" stroke="#C49A4A" stroke-width="3" stroke-linecap="round" opacity="0.4" />
