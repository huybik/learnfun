  <path d="M18,56 L28,108 C30,114 36,118 42,118 L86,118 C92,118 98,114 100,108 L110,56 Z" fill="url(#basketWeave)" />
  <!-- Weave pattern horizontal -->
  <line x1="22" y1="68" x2="106" y2="68" stroke="#8B5E3C" stroke-width="1.5" opacity="0.3" />
  <line x1="24" y1="80" x2="104" y2="80" stroke="#8B5E3C" stroke-width="1.5" opacity="0.3" />
  <line x1="26" y1="92" x2="102" y2="92" stroke="#8B5E3C" stroke-width="1.5" opacity="0.3" />
  <line x1="28" y1="104" x2="100" y2="104" stroke="#8B5E3C" stroke-width="1.5" opacity="0.3" />
  <!-- Weave pattern vertical -->
  <line x1="40" y1="56" x2="36" y2="118" stroke="#8B5E3C" stroke-width="1.5" opacity="0.25" />
  <line x1="56" y1="56" x2="52" y2="118" stroke="#8B5E3C" stroke-width="1.5" opacity="0.25" />
  <line x1="72" y1="56" x2="72" y2="118" stroke="#8B5E3C" stroke-width="1.5" opacity="0.25" />
  <line x1="88" y1="56" x2="88" y2="118" stroke="#8B5E3C" stroke-width="1.5" opacity="0.25" />
