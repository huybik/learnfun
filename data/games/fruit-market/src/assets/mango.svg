    <path d="M48,102 C30,95 25,75 28,55 C32,30 55,18 75,20 C100,22 118,45 115,75 C112,100 90,115 70,110 C60,108 55,105 48,102 Z" style="fill:url(#mango_skin);" />
    <path d="M72,22 C70,15 72,10 75,8 C78,6 82,10 80,18" style="fill:none;stroke:#5d3a1a;stroke-width:2.5;stroke-linecap:round;" />
    <path d="M76,10 C85,2 105,8 108,18 C110,25 95,28 80,22 C76,20 75,15 76,10 Z" style="fill:url(#mango_leaf_grad);" />
    <path d="M76,10 C85,12 95,18 108,18" style="fill:none;stroke:#2d5a27;stroke-width:0.5;opacity:0.6" />
    <path d="M12,85 C10,70 25,50 50,55 C65,60 75,85 68,105 C60,120 25,115 15,100 C12,95 12,90 12,85 Z" style="fill:#ffd700;stroke:#ff8c00;stroke-width:1.5;" />
    <path d="M16,86 C15,75 28,58 48,62 C60,65 68,85 62,102 C55,115 25,110 18,98 Z" style="fill:url(#mango_flesh);" />
    <g style="opacity:0.3">
      <path d="M30,70 L32,75 M40,72 L41,78 M50,78 L52,84 M25,85 L30,86 M35,95 L42,98 M20,95 L25,97" style="stroke:#d2691e;stroke-width:0.5;stroke-linecap:round;" />
    </g>
    <path d="M55,35 C45,35 35,45 35,60" style="fill:none;stroke:#ffffff;stroke-width:3;stroke-linecap:round;opacity:0.2;filter:url(#mango_blur_light);" />
  </g>
  <defs>
    <filter id="mango_blur_light">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </defs>
