<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="watermelon_body_grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#4a7c2a" />
      <stop offset="100%" style="stop-color:#1e3511" />
    </radialGradient>
    <linearGradient id="watermelon_stripe_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7fb539; stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#2d5016; stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7fb539; stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="watermelon_flesh_grad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#ff4d4d" />
      <stop offset="70%" style="stop-color:#e60000" />
      <stop offset="100%" style="stop-color:#b30000" />
    </radialGradient>
    <radialGradient id="watermelon_shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff; stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff; stop-opacity:0" />
    </radialGradient>
    <filter id="watermelon_shadow_blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
    <clipPath id="watermelon_body_clip">
      <ellipse cx="50" cy="65" rx="35" ry="45" transform="rotate(-10, 50, 65)" />
    </clipPath>
  </defs>

  <!-- Ground Shadow -->
  <ellipse cx="64" cy="110" rx="45" ry="8" style="fill:#000000; fill-opacity:0.15; filter:url(#watermelon_shadow_blur)" />

  <!-- Whole Watermelon -->
  <g>
    <ellipse cx="50" cy="65" rx="35" ry="45" transform="rotate(-10, 50, 65)" style="fill:url(#watermelon_body_grad)" />
    
    <!-- Stripes -->
    <g clip-path="url(#watermelon_body_clip)">
      <path d="M20,20 Q30,40 25,60 T30,110" style="fill:none; stroke:url(#watermelon_stripe_grad); stroke-width:8; stroke-linecap:round; opacity:0.7" transform="rotate(-10, 50, 65)" />
      <path d="M40,15 Q50,45 45,70 T50,115" style="fill:none; stroke:url(#watermelon_stripe_grad); stroke-width:10; stroke-linecap:round; opacity:0.7" transform="rotate(-10, 50, 65)" />
      <path d="M60,15 Q70,45 65,75 T70,115" style="fill:none; stroke:url(#watermelon_stripe_grad); stroke-width:10; stroke-linecap:round; opacity:0.7" transform="rotate(-10, 50, 65)" />
      <path d="M80,20 Q90,50 85,80 T90,110" style="fill:none; stroke:url(#watermelon_stripe_grad); stroke-width:8; stroke-linecap:round; opacity:0.7" transform="rotate(-10, 50, 65)" />
    </g>
    
    <!-- Surface Highlight -->
    <ellipse cx="40" cy="50" rx="15" ry="25" transform="rotate(-20, 40, 50)" style="fill:url(#watermelon_shine)" />
  </g>

  <!-- Watermelon Slice -->
  <g transform="translate(75, 85) rotate(-5)">
    <!-- Rind Outer -->
    <path d="M-35,0 A35,35 0 0,0 35,0 L0,5 Z" style="fill:#1e3511" />
    <!-- Rind Inner (Light Green/White) -->
    <path d="M-32,-2 A32,32 0 0,0 32,-2 L0,3 Z" style="fill:#f0fff0" />
    <!-- Flesh -->
    <path d="M-29,-4 A29,29 0 0,0 29,-4 L0,0 Z" style="fill:url(#watermelon_flesh_grad)" />
    
    <!-- Seeds -->
    <ellipse cx="-12" cy="-12" rx="1.5" ry="2.5" transform="rotate(20, -12, -12)" style="fill:#1a1a1a" />
    <ellipse cx="0" cy="-18" rx="1.5" ry="2.5" style="fill:#1a1a1a" />
    <ellipse cx="12" cy="-12" rx="1.5" ry="2.5" transform="rotate(-20, 12, -12)" style="fill:#1a1a1a" />
    <ellipse cx="-5" cy="-8" rx="1.2" ry="2.2" transform="rotate(10, -5, -8)" style="fill:#1a1a1a" />
    <ellipse cx="6" cy="-6" rx="1.2" ry="2.2" transform="rotate(-10, 6, -6)" style="fill:#1a1a1a" />
    
    <!-- Juiciness Highlights on Flesh -->
    <path d="M-20,-15 Q-15,-20 -10,-15" style="fill:none; stroke:#ffffff; stroke-width:0.5; stroke-opacity:0.4" />
    <circle cx="5" cy="-22" r="1" style="fill:#ffffff; fill-opacity:0.3" />
  </g>

  <!-- Stem -->
  <path d="M42,22 Q45,15 52,18" style="fill:none; stroke:#3d2b1f; stroke-width:2; stroke-linecap:round" />
</svg>