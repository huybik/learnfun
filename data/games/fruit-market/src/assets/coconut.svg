<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coconut_shell_grad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#8d5524;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#5d3a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2611;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="coconut_meat_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9d9d9;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="coconut_eye_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a0c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a2f18;stop-opacity:1" />
    </linearGradient>
    <filter id="coconut_shadow_blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  <!-- Ground Shadow -->
  <ellipse cx="64" cy="110" rx="45" ry="8" style="fill:#000000;fill-opacity:0.2;filter:url(#coconut_shadow_blur)" />
  <!-- Whole Coconut Body -->
  <path d="M30,75 C25,45 45,20 70,25 C95,30 100,60 95,85 C90,110 55,115 35,100 C25,90 32,85 30,75 Z" style="fill:url(#coconut_shell_grad)" />
  <!-- Fibrous Texture -->
  <g style="stroke:#4a2f18;stroke-width:0.5;stroke-linecap:round;opacity:0.6">
    <line x1="40" y1="35" x2="35" y2="45" />
    <line x1="55" y1="28" x2="52" y2="38" />
    <line x1="75" y1="30" x2="78" y2="40" />
    <line x1="90" y1="50" x2="98" y2="55" />
    <line x1="95" y1="75" x2="102" y2="80" />
    <line x1="30" y1="65" x2="22" y2="70" />
    <line x1="45" y1="105" x2="48" y2="112" />
    <line x1="70" y1="108" x2="75" y2="115" />
    <line x1="50" y1="50" x2="45" y2="60" />
    <line x1="65" y1="45" x2="68" y2="55" />
  </g>
  <!-- Coconut Eyes -->
  <circle cx="50" cy="40" r="3.5" style="fill:url(#coconut_eye_grad)" />
  <circle cx="62" cy="38" r="4" style="fill:url(#coconut_eye_grad)" />
  <circle cx="56" cy="48" r="3" style="fill:url(#coconut_eye_grad)" />
  <!-- Cut Slice -->
  <g transform="translate(15, 5)">
    <!-- Slice Shell -->
    <path d="M75,85 Q110,85 110,105 Q85,115 70,95 Z" style="fill:#5d3a1a" />
    <!-- Slice Meat -->
    <path d="M78,88 Q105,88 105,102 Q85,110 73,95 Z" style="fill:url(#coconut_meat_grad)" />
    <!-- Slice Texture -->
    <path d="M80,92 Q95,92 100,98" style="fill:none;stroke:#000000;stroke-width:0.2;opacity:0.1" />
  </g>
  <!-- Highlights -->
  <path d="M45,35 Q55,30 65,35" style="fill:none;stroke:#ffffff;stroke-width:1.5;stroke-linecap:round;opacity:0.2" />
  <path d="M85,55 Q90,65 88,75" style="fill:none;stroke:#ffffff;stroke-width:1;stroke-linecap:round;opacity:0.1" />
</svg>