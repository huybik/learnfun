<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="berry-blast_juice-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1a75;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#800080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b0082;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="berry-blast_glass-reflection" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="20%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="80%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.4" />
    </linearGradient>
    <radialGradient id="berry-blast_strawberry-grad" cx="40%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ff4d4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="berry-blast_blueberry-grad" cx="40%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#6666ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000066;stop-opacity:1" />
    </radialGradient>
    <filter id="berry-blast_glow">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Shadow under glass -->
  <ellipse cx="64" cy="118" rx="35" ry="6" style="fill:#000000;fill-opacity:0.2" />

  <!-- Glass Body (Back) -->
  <path d="M40 25 L44 110 Q44 116 64 116 Q84 116 84 110 L88 25" style="fill:#eef;fill-opacity:0.3;stroke:#fff;stroke-width:1" />

  <!-- Juice -->
  <path d="M42 45 L45 108 Q45 114 64 114 Q83 114 83 108 L86 45 Q64 50 42 45 Z" style="fill:url(#berry-blast_juice-fill)" />
  
  <!-- Surface of juice -->
  <ellipse cx="64" cy="45" rx="22" ry="4" style="fill:#ff4da6;fill-opacity:0.6" />

  <!-- Ice Cubes inside juice -->
  <rect x="50" y="60" width="18" height="18" rx="3" transform="rotate(15 59 69)" style="fill:#ffffff;fill-opacity:0.3;stroke:#ffffff;stroke-width:0.5" />
  <rect x="65" y="80" width="15" height="15" rx="3" transform="rotate(-10 72 87)" style="fill:#ffffff;fill-opacity:0.2;stroke:#ffffff;stroke-width:0.5" />

  <!-- Floating Blueberries -->
  <circle cx="55" cy="50" r="5" style="fill:url(#berry-blast_blueberry-grad)" />
  <circle cx="75" cy="48" r="4.5" style="fill:url(#berry-blast_blueberry-grad)" />
  <!-- Small seeds/spots on blueberries -->
  <circle cx="54" cy="48" r="0.8" style="fill:#fff;fill-opacity:0.3" />
  <circle cx="74" cy="46" r="0.7" style="fill:#fff;fill-opacity:0.3" />

  <!-- Strawberry on rim -->
  <path d="M85 20 Q80 20 78 30 Q78 42 88 45 Q98 42 98 30 Q96 20 91 20 L88 15 Z" style="fill:url(#berry-blast_strawberry-grad)" />
  <path d="M88 15 L84 18 L88 22 L92 18 Z" style="fill:#2d5a27" /> <!-- Leaf -->
  <!-- Strawberry Seeds -->
  <circle cx="84" cy="30" r="0.5" style="fill:#ffeb3b" />
  <circle cx="88" cy="35" r="0.5" style="fill:#ffeb3b" />
  <circle cx="92" cy="30" r="0.5" style="fill:#ffeb3b" />
  <circle cx="88" cy="28" r="0.5" style="fill:#ffeb3b" />
  <circle cx="83" cy="36" r="0.5" style="fill:#ffeb3b" />
  <circle cx="93" cy="36" r="0.5" style="fill:#ffeb3b" />

  <!-- Bubbles -->
  <circle cx="50" cy="90" r="1.5" style="fill:#fff;fill-opacity:0.6" />
  <circle cx="70" cy="100" r="1" style="fill:#fff;fill-opacity:0.5" />
  <circle cx="60" cy="75" r="2" style="fill:#fff;fill-opacity:0.4" />
  <circle cx="78" cy="65" r="1.2" style="fill:#fff;fill-opacity:0.6" />

  <!-- Glass Rim and Shine -->
  <ellipse cx="64" cy="25" rx="24" ry="5" style="fill:none;stroke:#ffffff;stroke-width:1.5;stroke-opacity:0.8" />
  <path d="M43 35 L46 105" style="stroke:#ffffff;stroke-width:2;stroke-linecap:round;stroke-opacity:0.4" />
  <path d="M85 35 L82 105" style="stroke:#ffffff;stroke-width:1;stroke-linecap:round;stroke-opacity:0.2" />

  <!-- Condensation Drops -->
  <circle cx="48" cy="85" r="1" style="fill:#fff;fill-opacity:0.7" />
  <circle cx="47" cy="88" r="0.8" style="fill:#fff;fill-opacity:0.7" />
  <circle cx="80" cy="70" r="0.9" style="fill:#fff;fill-opacity:0.7" />
  <circle cx="82" cy="95" r="1.2" style="fill:#fff;fill-opacity:0.7" />

  <!-- Highlight Streak -->
  <path d="M50 30 Q55 35 52 105" style="fill:none;stroke:url(#berry-blast_glass-reflection);stroke-width:4;stroke-linecap:round" />
  
  <!-- Final Topper: Straw -->
  <path d="M68 5 L68 60" style="fill:none;stroke:#fff;stroke-width:3;stroke-opacity:0.6" />
  <path d="M68 5 L68 15" style="fill:none;stroke:#ff66b2;stroke-width:3" />
  <path d="M68 25 L68 35" style="fill:none;stroke:#ff66b2;stroke-width:3" />
</svg>