      <path d="M 0,0 C 0,15 8,20 0,25 C -8,20 0,15 0,0" style="fill:url(#strawberry_leaf_grad)" />
      <path d="M -2,-2 L 2,-2 L 1,-12 L -1,-12 Z" style="fill:#4a7a0e" />
    </g>
    
    <path d="M 65,45 C 60,35 75,30 85,35" style="fill:none;stroke:#ffffff;stroke-width:2;opacity:0.2;filter:url(#strawberry_soft_shadow)" />
