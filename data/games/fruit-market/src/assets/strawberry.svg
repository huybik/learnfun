<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="strawberry_body_grad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#ff4d4d" />
      <stop offset="70%" style="stop-color:#d40000" />
      <stop offset="100%" style="stop-color:#800000" />
    </radialGradient>
    <radialGradient id="strawberry_slice_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="30%" style="stop-color:#fff0f0" />
      <stop offset="70%" style="stop-color:#ff4d4d" />
      <stop offset="100%" style="stop-color:#d40000" />
    </radialGradient>
    <linearGradient id="strawberry_leaf_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5e9c12" />
      <stop offset="100%" style="stop-color:#2d5006" />
    </linearGradient>
    <filter id="strawberry_soft_shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <ellipse cx="64" cy="115" rx="45" ry="8" style="fill:#000000;fill-opacity:0.15;filter:url(#strawberry_soft_shadow)" />
  
  <g id="strawberry_slice_group" transform="translate(20, 75) rotate(-15)">
