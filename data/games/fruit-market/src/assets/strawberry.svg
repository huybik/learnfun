    <circle cx="5" cy="5" r="1.2" transform="rotate(20 37 0)" style="fill:#f2e691" />
    <circle cx="70" cy="5" r="1.2" style="fill:#f2e691" />
    <circle cx="37" cy="38" r="1.2" style="fill:#f2e691" />
