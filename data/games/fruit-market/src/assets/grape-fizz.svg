<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grape-fizz_liquid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9d50bb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b0082;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grape-fizz_glass-shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
    </linearGradient>
    <radialGradient id="grape-fizz_grape-body" cx="35%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#ba55d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#480048;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="grape-fizz_straw-stripes" x1="0%" y1="0%" x2="100%" y2="0%" spreadMethod="repeat">
      <stop offset="0%" style="stop-color:#ff69b4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff69b4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <filter id="grape-fizz_blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
  </defs>
  
  <!-- Glass Shadows -->
  <ellipse cx="64" cy="116" rx="30" ry="6" style="fill:#000000;fill-opacity:0.15;filter:url(#grape-fizz_blur);" />
  
  <!-- Back Glass Rim -->
  <ellipse cx="64" cy="25" rx="28" ry="6" style="fill:none;stroke:#ffffff;stroke-width:1;stroke-opacity:0.3" />
  
  <!-- Ice Cubes (Deep) -->
  <rect x="50" y="70" width="18" height="18" rx="3" transform="rotate(15, 59, 79)" style="fill:#ffffff;fill-opacity:0.2" />
  <rect x="65" y="50" width="16" height="16" rx="3" transform="rotate(-10, 73, 58)" style="fill:#ffffff;fill-opacity:0.2" />

  <!-- The Juice -->
  <path d="M37,40 Q37,34 64,34 Q91,34 91,40 L86,108 Q86,114 64,114 Q42,114 42,108 Z" style="fill:url(#grape-fizz_liquid-grad)" />
  
  <!-- Fizz Bubbles -->
  <circle cx="50" cy="80" r="1.5" style="fill:#ffffff;fill-opacity:0.4" />
  <circle cx="75" cy="95" r="1" style="fill:#ffffff;fill-opacity:0.3" />
  <circle cx="60" cy="60" r="2" style="fill:#ffffff;fill-opacity:0.5" />
  <circle cx="82" cy="72" r="1.2" style="fill:#ffffff;fill-opacity:0.4" />
  <circle cx="45" cy="55" r="0.8" style="fill:#ffffff;fill-opacity:0.3" />
  <circle cx="68" cy="42" r="1.5" style="fill:#ffffff;fill-opacity:0.6" />
  <circle cx="55" cy="45" r="1" style="fill:#ffffff;fill-opacity:0.5" />
  
  <!-- Surface Bubbles (The Fizz) -->
  <ellipse cx="64" cy="38" rx="24" ry="4" style="fill:#ffffff;fill-opacity:0.2" />
  <circle cx="50" cy="37" r="2.5" style="fill:#ffffff;fill-opacity:0.4" />
  <circle cx="60" cy="35" r="2" style="fill:#ffffff;fill-opacity:0.4" />
  <circle cx="72" cy="36" r="3" style="fill:#ffffff;fill-opacity:0.4" />
  <circle cx="80" cy="38" r="1.5" style="fill:#ffffff;fill-opacity:0.4" />

  <!-- Straw -->
  <path d="M72,15 L78,15 L78,55 L72,55 Z" transform="rotate(-10, 75, 35)" style="fill:url(#grape-fizz_straw-stripes)" />
  <path d="M72,15 L78,15 Q78,10 85,8 L90,10 L88,15 Q83,14 78,15 Z" transform="rotate(-10, 75, 35)" style="fill:#ff69b4" />

  <!-- Glass Body -->
  <path d="M36,25 L42,110 Q42,118 64,118 Q86,118 86,110 L92,25 Q92,18 64,18 Q36,18 36,25 Z" style="fill:url(#grape-fizz_glass-shine);stroke:#ffffff;stroke-width:1;stroke-opacity:0.5" />
  
  <!-- Main Highlights on Glass -->
  <path d="M42,35 L46,105" style="fill:none;stroke:#ffffff;stroke-width:2;stroke-linecap:round;stroke-opacity:0.4" />
  <path d="M86,30 L84,50" style="fill:none;stroke:#ffffff;stroke-width:1.5;stroke-linecap:round;stroke-opacity:0.3" />

  <!-- Garnish: Grapes -->
  <g transform="translate(32, 30)">
    <path d="M2,-5 Q4,-8 6,-4" style="fill:none;stroke:#4b2c20;stroke-width:1.5" />
    <circle cx="0" cy="0" r="7" style="fill:url(#grape-fizz_grape-body)" />
    <circle cx="6" cy="4" r="7" style="fill:url(#grape-fizz_grape-body)" />
    <circle cx="2" cy="1" r="2" style="fill:#ffffff;fill-opacity:0.3" />
    <circle cx="8" cy="5" r="2" style="fill:#ffffff;fill-opacity:0.3" />
  </g>

  <!-- Condensation Drops -->
  <circle cx="48" cy="90" r="0.8" style="fill:#ffffff;fill-opacity:0.6" />
  <circle cx="82" cy="65" r="0.6" style="fill:#ffffff;fill-opacity:0.6" />
  <circle cx="45" cy="70" r="0.7" style="fill:#ffffff;fill-opacity:0.5" />
</svg>