services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learnfun
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1

  server:
    build: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - ./data:/data
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/learnfun
      REDIS_URL: redis://redis:6379
      LIVEKIT_URL: ws://livekit:7880
      DATA_DIR: /data
    depends_on:
      - postgres
      - redis
      - livekit
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000 --reload

  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - ./data:/data
    depends_on:
      - server
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
